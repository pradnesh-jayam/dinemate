<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="DineMate nearby restaurants." />
    <title>DineMate | Restaurants</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="restaurants">
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand" aria-label="DineMate">
          <div class="brand-mark">D</div>
          <div>
            <strong>DineMate</strong>
            <span>Meet someone over a meal</span>
          </div>
        </div>
        <nav class="nav" aria-label="Main navigation">
          <a class="nav-item" href="dashboard.html">Dashboard</a>
          <a class="nav-item active" href="programs.html">Restaurants</a>
          <a class="nav-item" href="meetings.html">Availability</a>
          <a class="nav-item" href="speakers.html">Matches</a>
        </nav>
        <section class="sync-panel">
          <span class="status-dot" id="syncDot"></span>
          <div>
            <strong id="syncMode">Demo sync</strong>
            <span id="syncText">Supabase connects when keys are added.</span>
          </div>
        </section>
        <button class="sign-out-button" id="signOutBtn" type="button">Sign out</button>
      </aside>

      <main class="main">
        <header class="topbar">
          <div>
            <p class="eyebrow">Nearby restaurants</p>
            <h1>Choose a place and see who is free to dine there.</h1>
          </div>
          <select id="cuisineFilter" aria-label="Filter restaurants by cuisine">
            <option value="all">All cuisines</option>
            <option value="North Indian">North Indian</option>
            <option value="Japanese">Japanese</option>
            <option value="Vegetarian">Vegetarian</option>
            <option value="Italian">Italian</option>
          </select>
        </header>
        <section class="panel">
          <div class="program-list" id="restaurantList"></div>
        </section>
      </main>
    </div>

    <div id="toast" class="toast" role="status"></div>
    <script src="config.js"></script>
    <script src="app.js"></script>
  </body>
</html>
