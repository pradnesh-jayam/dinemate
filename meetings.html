<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="DineMate dining availability." />
    <title>DineMate | Availability</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="availability">
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand" aria-label="DineMate">
          <div class="brand-mark">D</div>
          <div>
            <strong>DineMate</strong>
            <span>Meet someone over a meal</span>
          </div>
        </div>
        <nav class="nav" aria-label="Main navigation">
          <a class="nav-item" href="dashboard.html">Dashboard</a>
          <a class="nav-item" href="programs.html">Restaurants</a>
          <a class="nav-item active" href="meetings.html">Availability</a>
          <a class="nav-item" href="speakers.html">Matches</a>
        </nav>
        <section class="sync-panel">
          <span class="status-dot" id="syncDot"></span>
          <div>
            <strong id="syncMode">Demo sync</strong>
            <span id="syncText">Supabase connects when keys are added.</span>
          </div>
        </section>
        <button class="sign-out-button" id="signOutBtn" type="button">Sign out</button>
      </aside>

      <main class="main">
        <header class="topbar">
          <div>
            <p class="eyebrow">Dining availability</p>
            <h1>People who are open to a meal at a selected restaurant.</h1>
          </div>
          <div class="button-row">
            <a class="primary-button link-button" href="create-meeting.html">Add my time</a>
            <a class="secondary-button link-button" href="join-meeting.html">Quick join</a>
          </div>
        </header>
        <section class="panel">
          <div class="meeting-list" id="availabilityList"></div>
        </section>
      </main>
    </div>

    <!-- Theme Toggle -->
    <div style="position: fixed; top: 20px; right: 20px; z-index: 1000;">
      <button id="themeToggle" style="padding: 12px; border-radius: 50%; border: none; background: var(--paper); color: var(--ink); box-shadow: var(--shadow); cursor: pointer; font-size: 20px; transition: all 0.2s ease;">
        🌙
      </button>
    </div>

    <div id="toast" class="toast" role="status"></div>
    <script src="config.js"></script>
    <script src="app.js"></script>
    <script>
      // Theme Toggle Logic
      const themeToggle = document.getElementById('themeToggle');
      
      // Check saved theme
      const savedTheme = localStorage.getItem('dinemate-theme');
      if (savedTheme) {
        document.documentElement.setAttribute('data-theme', savedTheme);
        themeToggle.textContent = savedTheme === 'dark' ? '☀️' : '🌙';
      }
      
      themeToggle.addEventListener('click', () => {
        const currentTheme = document.documentElement.getAttribute('data-theme');
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', newTheme);
        localStorage.setItem('dinemate-theme', newTheme);
        themeToggle.textContent = newTheme === 'dark' ? '☀️' : '🌙';
      });
    </script>
  </body>
</html>
