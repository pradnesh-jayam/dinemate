<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Quick join a DineMate restaurant list." />
    <title>DineMate | Quick Join</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="quick-join">
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand" aria-label="DineMate">
          <div class="brand-mark">D</div>
          <div>
            <strong>DineMate</strong>
            <span>Meet someone over a meal</span>
          </div>
        </div>
        <nav class="nav" aria-label="Main navigation">
          <a class="nav-item" href="dashboard.html">Dashboard</a>
          <a class="nav-item" href="programs.html">Restaurants</a>
          <a class="nav-item active" href="meetings.html">Availability</a>
          <a class="nav-item" href="speakers.html">Matches</a>
        </nav>
        <section class="sync-panel">
          <span class="status-dot" id="syncDot"></span>
          <div>
            <strong id="syncMode">Demo sync</strong>
            <span id="syncText">Supabase connects when keys are added.</span>
          </div>
        </section>
        <button class="sign-out-button" id="signOutBtn" type="button">Sign out</button>
      </aside>

      <main class="main narrow-main">
        <header class="topbar">
          <div>
            <p class="eyebrow">Quick join</p>
            <h1>Add yourself to a restaurant list for a random match.</h1>
          </div>
        </header>
        <section class="panel">
          <form class="stack-form" id="joinForm">
            <label>
              <span>Restaurant</span>
              <select id="restaurantSelect" name="restaurantId" required></select>
            </label>
            <div class="form-row">
              <label>
                <span>Date</span>
                <input id="joinDate" name="date" type="date" required />
              </label>
              <label>
                <span>Time</span>
                <input id="joinTime" name="time" type="time" required />
              </label>
            </div>
            <button class="secondary-button full-width" type="submit">Join dining list</button>
          </form>
        </section>
      </main>
    </div>

    <div id="toast" class="toast" role="status"></div>
    <script src="config.js"></script>
    <script src="app.js"></script>
  </body>
</html>
