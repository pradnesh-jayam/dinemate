# netlify.toml - Netlify deployment configuration for DineMate

[build]
  # No build step needed - we serve files as-is
  publish = "."
  command = "echo 'DineMate ready for deployment'"

# Redirect to dashboard-final.html for non-existent routes
[[redirects]]
  from = "/*"
  to = "/dashboard-final.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"
