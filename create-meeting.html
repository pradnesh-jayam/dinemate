<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Add DineMate dining availability." />
    <title>DineMate | Add Time</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="add-time">
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand" aria-label="DineMate">
          <div class="brand-mark">D</div>
          <div>
            <strong>DineMate</strong>
            <span>Meet someone over a meal</span>
          </div>
        </div>
        <nav class="nav" aria-label="Main navigation">
          <a class="nav-item" href="dashboard.html">Dashboard</a>
          <a class="nav-item" href="programs.html">Restaurants</a>
          <a class="nav-item active" href="meetings.html">Availability</a>
          <a class="nav-item" href="speakers.html">Matches</a>
        </nav>
        <section class="sync-panel">
          <span class="status-dot" id="syncDot"></span>
          <div>
            <strong id="syncMode">Demo sync</strong>
            <span id="syncText">Supabase connects when keys are added.</span>
          </div>
        </section>
        <button class="sign-out-button" id="signOutBtn" type="button">Sign out</button>
      </aside>

      <main class="main narrow-main">
        <header class="topbar">
          <div>
            <p class="eyebrow">Add my time</p>
            <h1>Choose where and when you are available to dine.</h1>
          </div>
        </header>
        <section class="panel">
          <form class="stack-form" id="availabilityForm">
            <label>
              <span>Restaurant</span>
              <select id="restaurantSelect" name="restaurantId" required></select>
            </label>
            <label>
              <span>Your name</span>
              <input id="guestName" name="guest" type="text" placeholder="Leave empty to use your profile name" />
            </label>
            <div class="form-row">
              <label>
                <span>Date</span>
                <input id="slotDate" name="date" type="date" required />
              </label>
              <label>
                <span>Time</span>
                <input id="slotTime" name="time" type="time" required />
              </label>
            </div>
            <label>
              <span>Seats needed</span>
              <input id="partySize" name="partySize" type="number" min="1" max="4" value="1" required />
            </label>
            <label>
              <span>Short note</span>
              <input id="slotNote" name="note" type="text" placeholder="Coffee, dinner, quick lunch, trying a new place..." />
            </label>
            <button class="primary-button full-width" type="submit">Add availability</button>
          </form>
        </section>
      </main>
    </div>

    <div id="toast" class="toast" role="status"></div>
    <script src="config.js"></script>
    <script src="app.js"></script>
  </body>
</html>
